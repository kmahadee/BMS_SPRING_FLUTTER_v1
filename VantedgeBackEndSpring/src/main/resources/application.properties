spring.application.name=demoBankManagement

spring.datasource.url=jdbc:mysql://localhost:3307/test22
spring.datasource.username=root
spring.datasource.password=root


# JDBC Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


#server.port=8080

